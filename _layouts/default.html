<!DOCTYPE html>
<html lang="en-UK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: Georgia, serif; color: #333; }

    .wrapper {
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── Top header bar ── */
    header {
      background: #2c2c2c;
      padding: 24px 40px 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    header img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 10px;
      border: 2px solid #fff;
    }

    header h1 {
      color: #fff;
      font-size: 1.6rem;
      margin-bottom: 16px;
    }

    /* ── Tab nav sits at the bottom of the header ── */
    nav {
      display: flex;
      gap: 4px;
      margin-top: 12px;
    }

    nav a {
      display: inline-block;
      padding: 10px 24px;
      background: transparent;
      color: #ccc;
      text-decoration: none;
      font-family: Arial, sans-serif;
      font-size: 0.95rem;
      border-radius: 6px 6px 0 0;
      transition: background 0.15s, color 0.15s;
    }

    nav a:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    nav a.active {
      background: #f5f5f5;
      color: #2c2c2c;
      font-weight: bold;
    }

    /* ── Page content ── */
    section {
      padding: 40px;
      background: #f5f5f5;
      min-height: 60vh;
    }

    section h2 { margin-bottom: 12px; }
    section p, section li { line-height: 1.7; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <h1>{{ site.title }}</h1>
      {% if site.logo %}
        <img src="{{ site.logo | relative_url }}" alt="Logo">
      {% endif %}
      <nav>
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>About</a>
        <a href="{{ '/portfolio' | relative_url }}" {% if page.url contains 'portfolio' %}class="active"{% endif %}>Portfolio</a>
        <a href="{{ '/contact' | relative_url }}" {% if page.url contains 'contact' %}class="active"{% endif %}>Contact</a>
      </nav>
    </header>
    <section>
      {{ content }}
    </section>
  </div>
</body>
</html>
