<!DOCTYPE html>
<html lang="en-UK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  <style>
    nav { margin: 16px 0; }
    nav a {
      margin-right: 16px;
      text-decoration: none;
      color: #494949;
      font-weight: bold;
      font-size: 1.1rem;
      padding: 6px 0;
    }
    nav a:hover { text-decoration: underline; }
    nav a.active {
      border-bottom: 2px solid #494949;
      font-size: 1.2rem;
      font-weight: 900;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      nav a {
        margin-right: 0;
        font-size: 1rem;
        padding: 8px 12px;
        background: #f0f0f0;
        border-radius: 4px;
      }
      nav a.active {
        background: #494949;
        color: #fff;
        border-bottom: none;
        font-size: 1rem;
      }
      header img {
        max-width: 100%;
        height: auto;
      }
      .wrapper {
        padding: 0 16px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <h1>{{ site.title }}</h1>
      {% if site.logo %}
        <img src="{{ site.logo | relative_url }}" alt="Logo">
      {% endif %}
      <nav>
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>About me</a>
        <a href="{{ '/portfolio' | relative_url }}" {% if page.url contains 'portfolio' %}class="active"{% endif %}>Portfolio</a>
        <a href="{{ '/contact' | relative_url }}" {% if page.url contains 'contact' %}class="active"{% endif %}>Contact</a>
      </nav>
    </header>
    <section>
      {{ content }}
    </section>
  </div>
</body>
</html>
